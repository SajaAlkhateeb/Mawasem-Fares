services:
  - type: web
    name: mawasem-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && gunicorn core.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,mawsemjo.com,www.mawsemjo.com"
      - key: FRONTEND_URL
        value: "https://mawsemjo.com"
      - key: PYTHON_VERSION
        value: "3.13.7"
      - key: DATABASE_URL
        fromDatabase:
          name: mawasem-db
          property: connectionString
      - key: DEFAULT_FROM_EMAIL
        value: "Mawasem <noreply@mawsemjo.com>"
      - key: BREVO_API_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: mawasem-db
    plan: free
